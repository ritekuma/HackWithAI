# HackWithAI v2 - Infrastructure Services
# Centrifugo (WebSocket) + Qdrant (Vector DB)
# Both have restart: unless-stopped so they auto-start on system reboot.

services:
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: hwai-centrifugo
    restart: unless-stopped
    ports:
      - "8000:8000"   # WebSocket + SSE + HTTP Stream (public)
      - "9000:9000"   # Admin REST API (internal use)
    volumes:
      - ../docker/centrifugo/config.json:/centrifugo/config.json:ro
    environment:
      - CENTRIFUGO_TOKEN_HMAC_SECRET_KEY=${CENTRIFUGO_TOKEN_SECRET}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
    command: centrifugo -c config.json
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: hwai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qdrant_data:
