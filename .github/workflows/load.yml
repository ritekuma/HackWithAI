name: Load Test

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: 'Concurrent missions (10, 25, 50, 100, 250)'
        required: false
        default: '50'

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with: { node-version: '20.x', cache: 'pnpm' }
      - run: pnpm install --no-frozen-lockfile
      - run: npm rebuild better-sqlite3 --build-from-source
      - run: npx tsx scripts/validation/load.ts ${{ github.event.inputs.concurrency || '50' }} --output data/load-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: load-report
          path: data/load-report.json
