name: GA Certification

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'lib/mission-kernel/**'
      - 'lib/events/**'
      - 'lib/governance/**'
      - 'lib/executive/**'
      - 'lib/api/chat-handler.ts'

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with: { node-version: '20.x', cache: 'pnpm' }
      - run: pnpm install --no-frozen-lockfile
      - run: npx tsx scripts/validation/ga-certify.ts --output data/ga-cert.json
      - uses: actions/upload-artifact@v4
        with:
          name: ga-certification
          path: data/ga-cert.json
